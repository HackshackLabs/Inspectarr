name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install project and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e .
      - name: Audit dependencies
        run: pip-audit
